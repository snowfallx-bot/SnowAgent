logging:
  level: info
  saveLogsToFile: true

runtime:
  detectTimeoutMs: 5000
  maxPromptArgLength: 4000

artifacts:
  rootDir: artifacts
  saveOutputs: true
  savePromptFiles: true
  saveLogs: true

routing:
  routes:
    summarize: [copilot, qwen, codex]
    review: [codex, copilot, qwen]
    fix: [codex, qwen, copilot]
    plan: [copilot, qwen, codex]

agents:
  codex:
    enabled: true
    commandCandidates: [codex, codex.exe, codex.cmd]
    defaultArgs: [exec]
    inputModePriority: [stdin, args]
    timeoutMs: 120000
    retries: 1
    env: {}
    detect:
      versionArgs:
        - [--version]
        - [version]
      helpArgs:
        - [exec, --help]
        - [--help]
        - [-h]
    run:
      stdinArgs:
        - "-"
      promptFileArgs: []
      promptArgArgs:
        - "{prompt}"
      jsonModeArgs:
        - --json
      nonInteractiveArgs:
        - --skip-git-repo-check
        - --full-auto
      cwdArgs:
        - --cd
        - "{cwd}"
    capabilities:
      supportsStdin: true
      supportsPromptFile: false
      supportsArgs: true
      supportsJsonMode: true
      supportsCwd: true
      supportsNonInteractive: true
    notes:
      - Defaults target `codex exec`, which is the documented non-interactive command on the local machine.
      - If your Codex CLI needs different safety flags or a different entrypoint, override these fields.

  copilot:
    enabled: true
    commandCandidates: [github-copilot, copilot, copilot.exe, copilot.cmd]
    defaultArgs: []
    inputModePriority: [args]
    timeoutMs: 120000
    retries: 1
    env: {}
    detect:
      versionArgs:
        - [--version]
      helpArgs:
        - [--help]
        - [help]
    run:
      stdinArgs: []
      promptFileArgs: []
      promptArgArgs:
        - --prompt
        - "{prompt}"
      jsonModeArgs:
        - --output-format
        - json
        - --silent
      nonInteractiveArgs:
        - --allow-all-tools
        - --no-ask-user
        - --stream
        - off
      cwdArgs:
        - --add-dir
        - "{cwd}"
    capabilities:
      supportsStdin: false
      supportsPromptFile: false
      supportsArgs: true
      supportsJsonMode: true
      supportsCwd: true
      supportsNonInteractive: true
    notes:
      - Defaults target `copilot --prompt`, which the local help documents as the non-interactive mode.
      - `--allow-all-tools` is included because Copilot requires it for non-interactive execution.

  qwen:
    enabled: true
    commandCandidates: [qwen, qwen.exe, qwen.cmd, opencode, opencode.exe, opencode.cmd]
    defaultArgs: []
    inputModePriority: [args]
    timeoutMs: 120000
    retries: 1
    env: {}
    detect:
      versionArgs:
        - [--version]
      helpArgs:
        - [--help]
    run:
      stdinArgs: []
      promptFileArgs: []
      promptArgArgs:
        - "{prompt}"
      jsonModeArgs:
        - --output-format
        - json
      nonInteractiveArgs:
        - --approval-mode
        - yolo
      cwdArgs:
        - --add-dir
        - "{cwd}"
    capabilities:
      supportsStdin: false
      supportsPromptFile: false
      supportsArgs: true
      supportsJsonMode: true
      supportsCwd: true
      supportsNonInteractive: true
    notes:
      - Defaults target positional prompts because the local Qwen help documents them as the one-shot path.
      - Configure Qwen auth before using non-interactive mode.
